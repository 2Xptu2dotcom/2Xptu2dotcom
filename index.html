<!DOCTYPE html>
<html>
<body style="background:black; color:#39ff14; font-family:monospace; padding:20px;">
    <h3>Joker-Logbuch</h3>
    <div id="chat" style="height:300px; border:1px solid #39ff14; overflow-y:scroll; margin-bottom:10px;"></div>
    <input id="text" placeholder="Lore-Idee..." style="background:black; color:#39ff14; border:1px solid #39ff14;">
    <button onclick="send()" style="background:#39ff14; color:black;">Senden</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js"></script>
    <script>
        const socket = io("https://socket-server-production-d3a3.up.railway.app/");
        const chat = document.getElementById('chat');
        
        function send() {
            const msg = document.getElementById('text').value;
            socket.emit('chat', msg);
            document.getElementById('text').value = '';
        }

        socket.on('chat', (msg) => {
            chat.innerHTML += '<div>> ' + msg + '</div>';
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
