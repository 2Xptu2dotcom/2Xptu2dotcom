<!DOCTYPE html>
<html>
<head>
    <title>Joker-Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #00ff00; padding: 20px; }
        #chat { border: 2px solid #555; height: 300px; overflow-y: scroll; margin: 10px 0; padding: 10px; background: #000; }
        input, button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Chat</h1>
    <div id="status">Verbinde...</div>
    <input id="peerID" placeholder="ID vom Freund">
    <button onclick="verbinden()">Verbinden</button>
    <div id="chat"></div>
    <input id="msg" placeholder="Nachricht...">
    <button onclick="senden()">Senden</button>

    <script>
        const peer = new Peer();
        let conn;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Deine ID: " + id;
        });

        function verbinden() {
            const id = document.getElementById('peerID').value;
            conn = peer.connect(id);
            setup();
        }

        peer.on('connection', (c) => {
            conn = c;
            setup();
        });

        function setup() {
            conn.on('open', () => document.getElementById('status').innerText = "Verbunden!");
            conn.on('data', (data) => {
                const div = document.createElement('div');
                div.innerText = "Freund: " + data;
                document.getElementById('chat').appendChild(div);
            });
        }

        function senden() {
            const msg = document.getElementById('msg').value;
            conn.send(msg);
            const div = document.createElement('div');
            div.innerText = "Ich: " + msg;
            document.getElementById('chat').appendChild(div);
        }
    </script>
</body>
</html>
