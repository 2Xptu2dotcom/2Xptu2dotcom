<!DOCTYPE html>
<html>
<head>
    <title>Joker Chat</title>
    <style>
        body { background: #000; color: #39ff14; font-family: monospace; padding: 20px; }
        #chatBox { width: 100%; height: 300px; background: #111; border: 1px solid #39ff14; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
    </style>
</head>
<body>
    <h2>Joker Chat Raum</h2>
    <div id="chatBox"></div>
    <input id="eingabe" placeholder="Nachricht eingeben..." style="width: 70%;">
    <button onclick="senden()">Senden</button>

    <script>
        function senden() {
            var input = document.getElementById("eingabe");
            var text = input.value;
            if (text.trim() !== "") {
                var chat = document.getElementById("chatBox");
                chat.innerHTML += "<div>Joker: " + text + "</div>";
                input.value = "";
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
