<!DOCTYPE html>
<html>
<head>
    <title>Joker Chat Raum</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <h2>Joker-Chat: <span id="roomName"></span></h2>
    <div id="status">Verbinde...</div>
    <div id="chat" style="height: 200px; border: 1px solid black; overflow-y: scroll;"></div>
    <input id="msg" placeholder="Nachricht...">
    <button onclick="senden()">Senden</button>

    <script>
        // Raum-Name aus der URL holen (z.B. ?room=Geheim)
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'Hauptraum';
        document.getElementById('roomName').innerText = room;

        // PeerJS verbindet alle im gleichen "Raum" über den Namen
        const peer = new Peer(room + '-' + Math.floor(Math.random() * 10000));
        let conn;

        peer.on('open', () => document.getElementById('status').innerText = "Bereit im Raum: " + room);

        peer.on('connection', (c) => {
            conn = c;
            setup();
        });

        // Automatische Suche nach anderen im Raum (hier vereinfacht)
        function verbinden(friendId) {
            conn = peer.connect(friendId);
            setup();
        }

        function setup() {
            conn.on('data', (data) => {
                const div = document.createElement('div');
                div.innerText = "Freund: " + data;
                document.getElementById('chat').appendChild(div);
            });
        }

        function senden() {
            const msg = document.getElementById('msg').value;
            conn.send(msg);
            const div = document.createElement('div');
            div.innerText = "Ich: " + msg;
            document.getElementById('chat').appendChild(div);
        }
    </script>
</body>
</html>
