<!DOCTYPE html>
<html>
<head>
    <title>P2P Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <h2>Joker-Netzwerk Chat</h2>
    <div id="status">Verbinde...</div>
    <input id="peerID" placeholder="ID des Freundes">
    <button onclick="verbinden()">Verbinden</button>
    <div id="chat"></div>
    <input id="msg" placeholder="Nachricht...">
    <button onclick="senden()">Senden</button>

    <script>
        const peer = new Peer();
        let conn;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Deine ID: " + id + " (Teile diese ID deinem Freund mit!)";
        });

        function verbinden() {
            const id = document.getElementById('peerID').value;
            conn = peer.connect(id);
            setupConnection();
        }

        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => document.getElementById('status').innerText = "Verbunden!");
            conn.on('data', (data) => {
                const div = document.createElement('div');
                div.innerText = "Freund: " + data;
                document.getElementById('chat').appendChild(div);
            });
        }

        function senden() {
            const msg = document.getElementById('msg').value;
            conn.send(msg);
            const div = document.createElement('div');
            div.innerText = "Ich: " + msg;
            document.getElementById('chat').appendChild(div);
        }
    </script>
</body>
</html>
