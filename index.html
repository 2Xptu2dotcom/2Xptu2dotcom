<!DOCTYPE html>
<html>
<body style="background:black; color:#39ff14; font-family:monospace;">
    <h3>Joker-Logbuch (Lore-Raum)</h3>
    <div id="chat" style="height:300px; border:1px solid #39ff14; overflow-y:scroll;"></div>
    <input id="text" placeholder="Lore-Idee schreiben...">
    <button onclick="send()">Senden</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // Hier wird dein Raum gespeichert
        const firebaseConfig = { databaseURL: "https://joker-nft-chat-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const refChat = ref(db, 'lore-raum');

        function send() {
            push(refChat, document.getElementById('text').value);
            document.getElementById('text').value = '';
        }

        onChildAdded(refChat, (data) => {
            document.getElementById('chat').innerHTML += '<div>' + data.val() + '</div>';
        });
        window.send = send;
    </script>
</body>
</html>
