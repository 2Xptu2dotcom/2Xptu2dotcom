<!DOCTYPE html>
<html>
<body style="background:black; color:#39ff14; font-family:monospace;">
    <h3>Joker-Raum (P2P - Kein Speicher)</h3>
    <p>Deine ID: <b id="myID">Lade...</b></p>
    <input id="peerID" placeholder="ID vom Freund">
    <button onclick="connect()">Verbinden</button>
    <div id="log" style="height:200px; border:1px solid #39ff14; overflow-y:scroll; margin:10px 0;"></div>
    <input id="msg" placeholder="Nachricht...">
    <button onclick="send()">Senden</button>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const peer = new Peer();
        let conn;
        peer.on('open', id => document.getElementById('myID').innerText = id);
        
        peer.on('connection', c => {
            conn = c;
            conn.on('data', data => log('Freund: ' + data));
        });

        function connect() {
            conn = peer.connect(document.getElementById('peerID').value);
            conn.on('data', data => log('Freund: ' + data));
        }

        function send() {
            let val = document.getElementById('msg').value;
            conn.send(val);
            log('Du: ' + val);
        }

        function log(m) { document.getElementById('log').innerHTML += '<div>'+m+'</div>'; }
    </script>
</body>
</html>
