<!DOCTYPE html>
<html>
<head>
    <title>Lore Raum</title>
</head>
<body style="background:black; color:#39ff14; font-family:monospace; padding:20px;">
    <h3>Lore Raum (Shared)</h3>
    <!-- Hier erscheint der Text -->
    <div id="chat" style="height:400px; border:2px solid #39ff14; overflow-y:scroll; padding:10px; margin-bottom:10px;"></div>
    
    <!-- Hier schreibst du rein -->
    <input id="text" placeholder="Schreibe deine Idee..." style="background:black; color:#39ff14; border:1px solid #39ff14; width:80%; padding:10px;">
    <button onclick="send()" style="background:#39ff14; color:black; padding:10px; cursor:pointer;">Senden</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js"></script>
    <script>
        // Verbindung zum öffentlichen Joker-Server
        const socket = io("https://socket-server-production-d3a3.up.railway.app/");
        const chat = document.getElementById('chat');
        
        function send() {
            const msg = document.getElementById('text').value;
            if(msg) {
                socket.emit('chat', msg);
                document.getElementById('text').value = '';
            }
        }

        // Nachricht von anderen empfangen
        socket.on('chat', (msg) => {
            chat.innerHTML += '<div>> ' + msg + '</div>';
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
